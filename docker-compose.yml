version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gym-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gymadmin
      POSTGRES_PASSWORD: gympassword
      POSTGRES_DB: gymdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: gym-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
